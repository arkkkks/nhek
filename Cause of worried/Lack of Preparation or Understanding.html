        const verses = [
            { href: "../message/worried-matthew-6-34.html", text: "Matthew 6:34" },

            { href: "../message/worried-2-timothy-1-7.html", text: "2 Timothy 1:7" }
        ];

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function displayVerses() {
            const container = document.getElementById('verseContainer');
            const shuffled = shuffleArray(verses);
            const selected = shuffled.slice(0, 9);
                        container.innerHTML = selected.map(v => `<a href="${v.href}" class="verse-button">${v.text}</a>`).join('');
        }

        function refreshVerses() {
            displayVerses();
        }

        displayVerses();
    </script>

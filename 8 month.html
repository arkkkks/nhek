<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Feelings</title>
    <style>
        body {
            background-image:url("/IMAGES/Research%20UI%20(13).jpg");
            background-repeat:no-repeat;
            background-size: cover;
            font-family: Arial, sans-serif;
            background-color: #f8bbd0; /* Light pink background */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 80%;
            margin-top: 20px;
        }
        .search-bar {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .search-bar input[type="text"] {
            width: 50%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        .month-button {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            background-color: #fff;
            border: 2px solid #9c27b0; /* Purple border */
            border-radius: 30px;
            text-align: left;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s;
            box-sizing: border-box; /* Ensures padding is included in width */
        }
        .month-button:hover {
            background-color: #e1bee7; /* Lighter purple on hover */
        }
        .month-label {
            color: #e91e63; /* Pink color for month */
            margin-right: 10px;
        }
        /* Responsive layout */
        @media (max-width: 600px) {
            .container {
                width: 95%;
            }
            .search-bar input[type="text"] {
                width: 90%;
            }
            .month-button {
                font-size: 16px;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="search-bar">
            <input type="text" placeholder="Type your every month feeling...">
        </div>
        <button class="month-button">
            <span class="month-label">January</span> Feeling Overwhelmed
        </button>
        <button class="month-button">
            <span class="month-label">February</span> Feeling Left out
        </button>
        <button class="month-button">
            <span class="month-label">March</span> Burn out starts
        </button>
        <button class="month-button">
            <span class="month-label">April</span> Confused and drained
        </button>
        <button class="month-button">
            <span class="month-label">May</span> End of school pressure
        </button>
        <button class="month-button">
            <span class="month-label">June</span> Quiet sadness
        </button>
    </div>
</body>
</html>

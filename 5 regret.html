<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Causes of Regret</title>
    <style>
        body {
            background-image:url("/IMAGES/Research%20UI%20(9).jpg");
            background-repeat:no-repeat;
            background-size: cover;
            font-family: Arial, sans-serif;
            background-color: #ffe6f2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .circle-container {
            position: relative;
            width: 600px;
            height: 600px;
            margin-top: 40px;
        }

        .cause {
            position: absolute;
            width: 180px;
            height: 100px;
            border-radius: 50% / 40%;
            background-color: #d8b4fe;
            color: #4c1d95;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s ease-in-out;
            font-size: 1.1em;
            text-decoration: none;
            font-weight: bold;
        }

        .cause:hover {
            transform: scale(1.1);
            background-color: #c084fc;
        }

        .center-header {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .sadness-header {
            font-family: 'Playfair Display', serif;
            font-size: 2.3em;
            color: #8132cc;
            font-weight: bold;
            text-align: center;
            letter-spacing: 2px;
            text-shadow: 2px 4px 12px #b1324d, 0 1px 0 #a03c6e;
            background: rgb(255, 255, 255);
            border-radius: 18px;
            padding: 18px 0;
            width: 100%;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="circle-container">
        <div class="center-header">
            <h2 class="sadness-header">Causes of Regret</h2>
        </div>
        <a class="cause" style="--i:0;" href="Good Grades and Academic Success.html"></a>
        <a class="cause" style="--i:1;" href="Supportive Friends.html"></a>
        <a class="cause" style="--i:2;" href="feeling-unimportant-feature.html"></a>
        <a class="cause" style="--i:3;" href="4 verse.html"></a>
        <a class="cause" style="--i:4;" href="family-problems-feature.html"></a>
        <a class="cause" style="--i:5;" href="friendship-social-issue-feature.html"></a>
        <a class="cause" style="--i:6;" href="tiredness-feature.html"></a>
        <a class="cause" style="--i:7;" href="broken-feature.html"></a>
        <a class="cause" style="--i:8;" href="unmotivated-feature.html"></a>
    </div>
    <script>
        // Arrange oblong causes in a circle
        const causes = document.querySelectorAll('.cause');
        const total = causes.length;
        const centerX = 300;
        const centerY = 300;
        const radius = 270; // Increased from 220 to 270 for more distance

        causes.forEach((cause, i) => {
            const angle = (2 * Math.PI * i) / total - Math.PI / 2;
            const x = centerX + radius * Math.cos(angle) - 90; // 90 = half width
            const y = centerY + radius * Math.sin(angle) - 50; // 50 = half height
            cause.style.left = `${x}px`;
            cause.style.top = `${y}px`;
        });
    </script>
</body>
</html>

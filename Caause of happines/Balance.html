<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verses for Sadness</title>
    <!-- Elegant Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Great+Vibes&family=EB+Garamond:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-image:url("/IMAGES/Research%20UI%20(10).jpg");
            background-repeat:no-repeat;
            background-size: cover;
            font-family: Arial, sans-serif;
            background-color: #ffe6f2;
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Align to the left */
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0 20px 40px; /* Add left padding */
        }

        #header {
            text-align: left;
            margin-bottom: 20px;
            width: 100%;
        }

        #header h1 {
            font-family: 'Great Vibes', 'Playfair Display', 'EB Garamond', serif;
            font-size: 4em; /* Made heading bigger */
            color: #d63384;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-shadow: 2px 4px 18px #fff3fa, 0 1px 0 #a03c6e;
            margin-bottom: 10px;
            font-style: normal;
        }

        #header p {
            font-family: 'EB Garamond', 'Playfair Display', serif;
            font-size: 1.35em;
            color: #a03c6e;
            margin-top: 0;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .verse-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; /* 3 columns */
            gap: 18px 32px;
            justify-items: start;
            align-items: start;
            max-width: 700px;
            width: 100%;
        }

        .verse-button {
            background-color: #ffecb3;
            color: #795548;
            border: none;
            padding: 16px 28px;         /* Smaller padding */
            border-radius: 24px;        /* Slightly smaller radius */
            cursor: pointer;
            box-shadow: 0 4px 18px rgba(214, 51, 132, 0.18), 0 2px 8px rgba(0, 0, 0, 0.22);
            transition: transform 0.2s ease-in-out, box-shadow 0.2s;
            text-decoration: none;
            font-size: 1.15em;          /* Smaller font */
            text-align: left;
            min-width: 180px;           /* Narrower button */
            font-family: 'EB Garamond', 'Playfair Display', serif;
            font-weight: 700;
            white-space: pre-line; /* Allow line breaks */
            line-height: 1.5;
        }

        .verse-button:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 32px rgba(214, 51, 132, 0.28), 0 4px 16px rgba(0,0,0,0.28);
        }

        #jesus-image {
            margin-top: 30px;
        }

        #jesus-image img {
            width: 200px;
            height: auto;
        }

        /* Back and Home Buttons */
        .icon-btn {
            position: fixed;
            top: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(245, 230, 245, 0.95));
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 20;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(254, 197, 229, 0.4);
            border: 2px solid rgba(254, 197, 229, 0.5);
            text-decoration: none;
        }

        .back {
            left: 20px;
        }

        .home {
            right: 20px;
        }

        .icon-btn:hover {
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            transform: scale(1.15) rotate(10deg);
            box-shadow: 0 12px 35px rgba(255, 20, 147, 0.6);
            border-color: rgba(255, 20, 147, 0.8);
            color: white;
        }

        .icon-btn:active {
            transform: scale(1.05) rotate(10deg);
        }
    </style>
</head>
<body data-cause="Balance">
    <!-- BACK BUTTON -->
    <a class="icon-btn back" href="/CAUSES%20OF%20THE%20EMOTION/Cause%20of%20happy.html">&#8592;</a>

    <!-- HOME BUTTON -->
    <a class="icon-btn home" href="/Program%20Mental%20Health.html">&#127968;</a>

    <div id="header">
        <h1>Balanced study and free time?</h1>
        <p>Here are the verses that will help you.</p>
    </div>

    <div class="verse-container"></div>
    <script src="./verses.js"></script>
    <script>
        const page = decodeURIComponent(window.location.pathname.split('/').pop().split('.')[0]);
        const verses = versesData[page] || [];
        const container = document.querySelector('.verse-container');
        verses.forEach(v => {
            const a = document.createElement('a');
            a.className = 'verse-button';
            a.href = v.href;
            a.textContent = v.text;
            container.appendChild(a);
        });
    </script>

    <script>
        // JavaScript can be added here for more advanced functionality
    </script>
</body>
</html>

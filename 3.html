<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Diary Entries</title>
<style>
  body {
    font-family: "Poppins", sans-serif;
    background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
    text-align: center;
    padding: 40px 20px;
  }
  h1 {
    font-family: "Brush Script MT", cursive;
    color: #4b1b39;
    font-size: 40px;
    margin-bottom: 20px;
  }
  .search-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    background: #fff;
    border-radius: 30px;
    width: 70%;
    max-width: 600px;
    margin: 0 auto 30px;
    padding: 10px 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  .search-bar input {
    width: 100%;
    border: none;
    outline: none;
    font-size: 16px;
  }
  .diary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-top: 20px;
  }
  .diary-item {
    background: #fff;
    border: 2px solid #e8a2c8;
    border-radius: 25px;
    padding: 20px;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: transform 0.3s;
    cursor: pointer;
  }
  .diary-item:hover {
    transform: scale(1.03);
  }
  .month-circle {
    background: #e6849c;
    color: white;
    font-size: 14px;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .diary-info {
    flex-grow: 1;
  }
  .diary-title {
    font-size: 18px;
    font-weight: bold;
    color: #4b1b39;
  }
  .diary-date {
    font-size: 14px;
    color: #777;
  }
</style>
</head>
<body>

<h1>My Diary Entries</h1>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Type your every month feeling..." onkeyup="filterDiaries()">
</div>

<div class="diary-grid" id="diaryList"></div>

<script>
  function loadDiaries() {
    const diaries = JSON.parse(localStorage.getItem("diaryEntries")) || [];
    const diaryList = document.getElementById("diaryList");
    diaryList.innerHTML = "";

    diaries.forEach(entry => {
      const div = document.createElement("div");
      div.classList.add("diary-item");
      div.innerHTML = `
        <div class="month-circle">${entry.month}</div>
        <div class="diary-info">
          <div class="diary-title">${entry.title}</div>
          <div class="diary-date">${entry.feeling} • ${entry.month} ${entry.year}</div>
        </div>
      `;
      div.onclick = function() {
        // Save selected diary ID (ensure it’s a string)
        localStorage.setItem("selectedDiaryId", entry.id.toString());
        window.location.href = "view-diary.html";
      };
      diaryList.appendChild(div);
    });
  }

  function filterDiaries() {
    const query = document.getElementById("searchInput").value.toLowerCase();
    const all = JSON.parse(localStorage.getItem("diaryEntries")) || [];
    const filtered = all.filter(entry =>
      entry.title.toLowerCase().includes(query) ||
      entry.month.toLowerCase().includes(query) ||
      entry.feeling.toLowerCase().includes(query)
    );
    render(filtered);
  }

  function render(list) {
    const diaryList = document.getElementById("diaryList");
    diaryList.innerHTML = "";
    list.forEach(entry => {
      const div = document.createElement("div");
      div.classList.add("diary-item");
      div.innerHTML = `
        <div class="month-circle">${entry.month}</div>
        <div class="diary-info">
          <div class="diary-title">${entry.title}</div>
          <div class="diary-date">${entry.feeling} • ${entry.month} ${entry.year}</div>
        </div>
      `;
      div.onclick = function() {
        localStorage.setItem("selectedDiaryId", entry.id.toString());
        window.location.href = "view-diary.html";
      };
      diaryList.appendChild(div);
    });
  }

  loadDiaries();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Write Your Diary</title>
<style>
  body {
    font-family: "Poppins", sans-serif;
    background: linear-gradient(135deg, #fdd6e4, #f9b0d1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    height: 100vh;
    overflow: hidden;
  }

  h2 {
    font-family: 'Brush Script MT', cursive;
    color: #4b1b39;
    font-size: 32px;
    margin-bottom: 5px;
  }

  h3 {
    color: #444;
    margin-bottom: 15px;
    font-style: italic;
  }

  .book-container {
    position: relative;
    perspective: 2000px;
    width: 80%;
    max-width: 800px;
    height: 400px;
  }

  .book {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 1s;
  }

  .page {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #fffdfd;
    border: 2px solid #f2b6d4;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    backface-visibility: hidden;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 24px,
      rgba(240, 170, 200, 0.5) 25px
    );
    padding: 20px;
    box-sizing: border-box;
  }

  .page textarea {
    width: 100%;
    height: 100%;
    background: transparent;
    border: none;
    resize: none;
    outline: none;
    font-size: 16px;
    color: #333;
    line-height: 25px;
  }

  .page.flipped {
    transform: rotateY(-180deg);
  }

  .controls {
    margin-top: 20px;
  }

  button {
    background: #f6a6b9;
    border: none;
    border-radius: 25px;
    padding: 12px 35px;
    font-size: 16px;
    font-weight: bold;
    color: #4b1b39;
    cursor: pointer;
    margin: 0 10px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
  }

  button:hover {
    background: #f09eb2;
    transform: scale(1.05);
  }

  .message {
    background: rgba(255,255,255,0.7);
    border-radius: 15px;
    padding: 10px 20px;
    margin-bottom: 20px;
    color: #4b1b39;
    font-weight: bold;
    font-size: 16px;
  }

  /* Confirmation popup */
  .popup {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    visibility: hidden;
    opacity: 0;
    transition: opacity 0.4s ease, visibility 0.4s ease;
  }

  .popup.active {
    visibility: visible;
    opacity: 1;
  }

  .popup-box {
    background: #fff;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 300px;
  }

  .popup-box h4 {
    color: #4b1b39;
    margin-bottom: 20px;
  }

  .popup-box button {
    width: 100px;
  }
</style>
</head>
<body>

<div class="message">💖 Write freely — your diary saves automatically!</div>
<h2 id="diaryName">My Diary</h2>
<h3 id="diaryTitle">Title: "Untitled"</h3>

<div class="book-container">
  <div class="book" id="book">
    <div class="page" id="page1">
      <textarea id="page1Text" placeholder="Write something on page 1..."></textarea>
    </div>
    <div class="page" id="page2" style="transform: rotateY(180deg);">
      <textarea id="page2Text" placeholder="Continue writing on page 2..."></textarea>
    </div>
  </div>
</div>

<div class="controls">
  <button onclick="prevPage()">⬅ Prev</button>
  <button onclick="nextPage()">Next ➡</button>
  <button onclick="showPopup()">Done ✅</button>
</div>

<!-- Confirmation Popup -->
<div class="popup" id="popup">
  <div class="popup-box">
    <h4>Are you sure you’re done writing?</h4>
    <button onclick="confirmDone()">Yes</button>
    <button onclick="hidePopup()">No</button>
  </div>
</div>

<script>
  let currentPage = 1;

  // Load name and title
  const name = localStorage.getItem("diaryName");
  const title = localStorage.getItem("diaryTitle");
  if (name) document.getElementById("diaryName").textContent = `${name}'s Diary`;
  if (title) document.getElementById("diaryTitle").textContent = `Title: “${title}”`;

  // Load previous saved content
  document.getElementById("page1Text").value = localStorage.getItem("page1Text") || "";
  document.getElementById("page2Text").value = localStorage.getItem("page2Text") || "";

  // Auto-save on typing
  document.querySelectorAll("textarea").forEach(area => {
    area.addEventListener("input", () => {
      localStorage.setItem(area.id, area.value);
    });
  });

  // Page flip effect
  function nextPage() {
    if (currentPage === 1) {
      document.getElementById("book").style.transform = "rotateY(-180deg)";
      currentPage = 2;
    }
  }

  function prevPage() {
    if (currentPage === 2) {
      document.getElementById("book").style.transform = "rotateY(0deg)";
      currentPage = 1;
    }
  }

  // Popup functions
  function showPopup() {
    document.getElementById("popup").classList.add("active");
  }

  function hidePopup() {
    document.getElementById("popup").classList.remove("active");
  }

  function confirmDone() {
    hidePopup();
    window.location.href = "emotion.html"; // next feature page
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Emotion-Based Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f8f1e6;
    --ink: #302320;
    --accent: #bf6f38;
    --accent-soft: #efd0b8;
    --card: #fffaf3;
    --shadow: 0 14px 30px rgba(51, 35, 24, 0.16);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    color: var(--ink);
    font-family: "Manrope", sans-serif;
    background:
      radial-gradient(circle at 10% 12%, rgba(228, 190, 159, 0.44), transparent 42%),
      radial-gradient(circle at 90% 18%, rgba(186, 130, 85, 0.24), transparent 40%),
      linear-gradient(165deg, #fff9f2 0%, #f8efe2 47%, #f3e5d4 100%);
    overflow-x: hidden;
  }

  body::before,
  body::after {
    content: "";
    position: fixed;
    z-index: 0;
    border-radius: 999px;
    pointer-events: none;
    filter: blur(4px);
  }

  body::before {
    width: 300px;
    height: 300px;
    right: -120px;
    bottom: -50px;
    background: rgba(191, 111, 56, 0.18);
  }

  body::after {
    width: 220px;
    height: 220px;
    left: -70px;
    top: 90px;
    background: rgba(237, 203, 164, 0.35);
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 1300px;
    margin: 0 auto;
    padding: 22px 20px 28px;
  }

  .top-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .icon-btn {
    border: 0;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.8);
    color: #2e211e;
    font-size: 1.2rem;
    cursor: pointer;
    box-shadow: 0 8px 18px rgba(46, 33, 30, 0.16);
    transition: transform 0.2s ease, background-color 0.2s ease;
  }

  .icon-btn:hover {
    transform: translateY(-2px);
    background: #ffffff;
  }

  .hero {
    padding: 28px 20px;
    margin-bottom: 20px;
    border-radius: 22px;
    background:
      linear-gradient(135deg, rgba(255, 255, 255, 0.75), rgba(255, 246, 236, 0.95)),
      url("IMAGES/library.jpg") center/cover;
    border: 1px solid rgba(130, 86, 58, 0.2);
    box-shadow: var(--shadow);
    animation: slideIn 0.7s ease both;
  }

  .hero h1 {
    margin: 0;
    font-family: "Cormorant Garamond", serif;
    font-size: clamp(2rem, 3.8vw, 3.1rem);
    line-height: 1;
    letter-spacing: 0.02em;
  }

  .hero p {
    margin: 10px 0 0;
    max-width: 630px;
    color: #5b4a42;
    font-size: 0.95rem;
  }

  .library {
    position: relative;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 18px;
    padding: 18px;
    border-radius: 20px;
    border: 1px solid rgba(128, 91, 66, 0.2);
    background: linear-gradient(180deg, rgba(255, 252, 247, 0.74), rgba(255, 246, 234, 0.8));
    box-shadow: var(--shadow);
  }

  .library::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 20px;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent 164px,
      rgba(123, 85, 62, 0.06) 164px,
      rgba(123, 85, 62, 0.06) 168px
    );
    mix-blend-mode: multiply;
  }

  .book {
    position: relative;
    display: block;
    overflow: hidden;
    border-radius: 14px;
    text-decoration: none;
    aspect-ratio: 3 / 4;
    background: var(--card);
    border: 1px solid rgba(95, 61, 38, 0.14);
    box-shadow: 0 8px 16px rgba(53, 31, 19, 0.15);
    transform: translateY(20px) scale(0.98);
    opacity: 0;
    animation: liftIn 0.6s ease forwards;
    animation-delay: var(--stagger, 0ms);
    cursor: pointer;
    transition: transform 0.22s ease, box-shadow 0.22s ease;
  }

  .book:hover {
    transform: translateY(-8px) rotate(-0.8deg);
    box-shadow: 0 18px 28px rgba(50, 29, 17, 0.22);
  }

  .book img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .book--empty {
    background:
      linear-gradient(145deg, rgba(255, 243, 226, 0.92), rgba(243, 220, 193, 0.86));
  }

  .book-placeholder {
    position: absolute;
    inset: 0;
    z-index: 1;
    display: grid;
    place-items: center;
    text-align: center;
    padding: 14px;
    color: #5e4333;
    font-size: 0.82rem;
    font-weight: 700;
    line-height: 1.3;
  }

  .book::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 56%, rgba(23, 13, 8, 0.74) 100%);
    pointer-events: none;
  }

  .book-title {
    position: absolute;
    left: 10px;
    right: 10px;
    bottom: 10px;
    z-index: 2;
    color: #fff;
    font-size: 0.77rem;
    font-weight: 600;
    line-height: 1.25;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
  }

  .book-emotion {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 2;
    border-radius: 999px;
    padding: 3px 9px;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: #2f2017;
    background: rgba(254, 233, 210, 0.88);
    border: 1px solid rgba(145, 95, 66, 0.35);
  }

  .book:focus-visible {
    outline: 3px solid rgba(206, 123, 68, 0.64);
    outline-offset: 2px;
  }

  .book.is-clicked {
    transform: scale(0.95);
    box-shadow: 0 8px 18px rgba(53, 31, 19, 0.28);
  }

  .ripple {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.55);
    transform: translate(-50%, -50%) scale(0);
    pointer-events: none;
    animation: ripple 450ms ease-out forwards;
    z-index: 3;
  }

  .book-modal {
    position: fixed;
    inset: 0;
    z-index: 30;
    display: grid;
    place-items: center;
    padding: 16px;
  }

  .book-modal[hidden] {
    display: none;
  }

  .book-modal__backdrop {
    position: absolute;
    inset: 0;
    background: rgba(28, 18, 13, 0.58);
    backdrop-filter: blur(2px);
  }

  .book-modal__panel {
    position: relative;
    z-index: 1;
    width: min(620px, 100%);
    border-radius: 18px;
    border: 1px solid rgba(118, 77, 53, 0.25);
    padding: 22px 20px 18px;
    background: linear-gradient(170deg, #fffbf5, #f7ebdc);
    box-shadow: 0 18px 36px rgba(31, 19, 13, 0.36);
    animation: slideIn 0.24s ease both;
  }

  .book-modal__title {
    margin: 0;
    font-family: "Cormorant Garamond", serif;
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    line-height: 1.05;
  }

  .book-modal__emotion {
    margin: 8px 0 14px;
    font-size: 0.86rem;
    color: #6b4a38;
    font-weight: 700;
  }

  .book-modal__body {
    margin: 0 0 12px;
    color: #47352d;
    line-height: 1.5;
    font-size: 0.95rem;
  }

  .book-modal__tools {
    margin: 0 0 16px;
    padding-left: 18px;
    color: #3f2e25;
    font-size: 0.9rem;
    line-height: 1.45;
  }

  .book-modal__close {
    border: 0;
    border-radius: 10px;
    padding: 9px 13px;
    font-size: 0.84rem;
    font-weight: 700;
    color: #32231a;
    cursor: pointer;
    background: linear-gradient(145deg, #ffe4cb, #efc099);
  }

  @keyframes slideIn {
    from {
      opacity: 0;
      transform: translateY(16px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes liftIn {
    from {
      opacity: 0;
      transform: translateY(20px) scale(0.98);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  @keyframes ripple {
    to {
      opacity: 0;
      transform: translate(-50%, -50%) scale(16);
    }
  }

  @media (max-width: 700px) {
    .page {
      padding: 14px 12px 22px;
    }

    .hero {
      padding: 22px 16px;
      border-radius: 16px;
    }

    .library {
      gap: 12px;
      padding: 12px;
      border-radius: 15px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .book-title {
      font-size: 0.72rem;
    }

    .book-emotion {
      font-size: 0.62rem;
      padding: 3px 8px;
    }
  }
</style>
</head>

      "IMAGES/Dwyer_SOME-MISTAKES-WERE-MADE_popr2_500pcx.jpg",
      "IMAGES/1712156152879.jpg",
      "IMAGES/61ZxgcmkLuL.jpg",
      "IMAGES/70f718ac-2461-4c5d-94d4-76c83c9f2716.b2fbcacd18ed60aed7a0f45bc0a88cec.webp",
      "IMAGES/r.jpg",
      "IMAGES/n.webp",
      "IMAGES/OIP (1).webp",
      "IMAGES/o.webp",
      "IMAGES/n.webp",
      "IMAGES/jhu.webp",
      "IMAGES/h.webp",
      "IMAGES/k.webp",
      "IMAGES/g.jpg",
      "IMAGES/every.webp",
      "IMAGES/g.webp",
      "IMAGES/feeling.webp",
      "IMAGES/c.webp",
      "IMAGES/625876372_879234974991176_702511813437371796_n.jpg",
      "IMAGES/71ot8CZhx5L._SL1200_.jpg"
    ];

    const EXTRA_BOOK_LINKS = [
      "Ewan/40-when-sadness-feels-heavy.html",
      "Ewan/41-cooling-down-big-anger.html",
      "Ewan/42-stress-to-structure.html",
      "Ewan/43-brave-steps-for-fearful-days.html"
    ];
    const DEFAULT_EXTRA_BOOK_LINK = "Ewan/jealousy.html";

    const EMOTION_BY_KEYWORD = [
      { keyword: "sad", emotion: "Sad" },
      { keyword: "anger", emotion: "Angry" },
      { keyword: "anxiety", emotion: "Anxious" },
      { keyword: "stress", emotion: "Stressed" },
      { keyword: "fear", emotion: "Scared" },
      { keyword: "shy", emotion: "Shy" },
      { keyword: "guilt", emotion: "Guilty" },
      { keyword: "regret", emotion: "Regretful" },
      { keyword: "tired", emotion: "Tired" },
      { keyword: "hope", emotion: "Hopeful" }
    ];

    const libraryElement = document.getElementById("library");
    const modal = document.getElementById("bookModal");
    const modalTitle = document.getElementById("modalTitle");
    const modalEmotion = document.getElementById("modalEmotion");
    const modalSummary = document.getElementById("modalSummary");
    const modalStrategy = document.getElementById("modalStrategy");
    const modalPractice = document.getElementById("modalPractice");
    const closeModalBtn = document.getElementById("closeModalBtn");
    let lastFocusedCard = null;

    function createExtraCard(book) {
      const hasLink = Boolean(book.image && book.href);
      const card = document.createElement(hasLink ? "a" : "div");
      card.className = "book";
      if (hasLink) {
        card.setAttribute("href", book.href);
      } else {
        card.setAttribute("role", "button");
        card.setAttribute("tabindex", "0");
      }
      card.dataset.title = book.title;
      card.dataset.emotion = book.emotion;
      card.dataset.summary = book.summary;
      card.dataset.strategy = book.strategy;
      card.dataset.practice = book.practice;
      if (book.image) {
        card.innerHTML = `<img src="${book.image}" alt="${book.title}" />`;
      } else {
        card.classList.add("book--empty");
        card.innerHTML = `<div class="book-placeholder">Add your book cover here</div>`;
      }
      return card;
    }

    function goHome() {
      window.location.href = HOME_PAGE;
    }

    function goBack() {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        goHome();
      }
    }

    function addRipple(card, event) {
      const existingRipple = card.querySelector(".ripple");
      if (existingRipple) {
        existingRipple.remove();
      }

      const rect = card.getBoundingClientRect();
      const x = event.clientX || rect.left + rect.width / 2;
      const y = event.clientY || rect.top + rect.height / 2;
      const ripple = document.createElement("span");
      ripple.className = "ripple";
      ripple.style.left = `${x - rect.left}px`;
      ripple.style.top = `${y - rect.top}px`;
      card.appendChild(ripple);
    }

    function inferEmotion(title) {
      const normalized = title.toLowerCase();
      const matched = EMOTION_BY_KEYWORD.find((item) => normalized.includes(item.keyword));
      return matched ? matched.emotion : "Mixed Emotions";
    }

    function openBookModal(content, trigger) {
      lastFocusedCard = trigger || document.activeElement;
      modalTitle.textContent = content.title;
      modalEmotion.textContent = `Emotion Focus: ${content.emotion}`;
      modalSummary.textContent = content.summary;
      modalStrategy.textContent = content.strategy;
      modalPractice.textContent = content.practice;
      modal.hidden = false;
      document.body.style.overflow = "hidden";
      closeModalBtn.focus();
    }

    function closeBookModal() {
      modal.hidden = true;
      document.body.style.overflow = "";
      if (lastFocusedCard && typeof lastFocusedCard.focus === "function") {
        lastFocusedCard.focus();
      }
    }

    function normalizeCoverForReader(cover) {
      if (!cover) {
        return "";
      }
      if (cover.startsWith("IMAGES/")) {
        return `../${cover}`;
      }
      return cover;
    }

    function buildFallbackReaderLink(book, cover) {
      const params = new URLSearchParams({
        title: book.title,
        emotion: book.emotion,
        cover: normalizeCoverForReader(cover),
        summary: book.summary,
        strategy: book.strategy,
        practice: book.practice
      });
      return `${DEFAULT_EXTRA_BOOK_LINK}?${params.toString()}`;
    }

    EXTRA_BOOKS.forEach((book, index) => {
      const cover = USER_SUPPLIED_COVERS[index] || "";
      const directLink = EXTRA_BOOK_LINKS[index] || "";
      const href = cover ? (directLink || buildFallbackReaderLink(book, cover)) : "";
      const withCover = { ...book, image: cover, href };
      libraryElement.appendChild(createExtraCard(withCover));
    });

    document.querySelectorAll(".book").forEach((card, index) => {
      card.style.setProperty("--stagger", `${index * 40}ms`);

      const image = card.querySelector("img");
      const title = (card.dataset.title || (image && image.alt ? image.alt : "")).trim() || `Book ${index + 1}`;
      const emotion = (card.dataset.emotion || inferEmotion(title)).trim();
      const summary = card.dataset.summary || `${title} helps students process ${emotion.toLowerCase()} feelings and build healthier coping routines with support from trusted people.`;
      const strategy = card.dataset.strategy || "Try this strategy: pause, breathe, and write one realistic next action you can do today.";
      const practice = card.dataset.practice || "Daily practice: reflect for five minutes and ask for help early when feelings grow too heavy.";
      const content = { title, emotion, summary, strategy, practice };

      const titleElement = document.createElement("span");
      titleElement.className = "book-title";
      titleElement.textContent = title;
      card.appendChild(titleElement);

      const emotionElement = document.createElement("span");
      emotionElement.className = "book-emotion";
      emotionElement.textContent = emotion;
      card.appendChild(emotionElement);
      card.setAttribute("aria-label", `Open support book: ${title}`);

      const originalHref = card.getAttribute("href") || "";
      const keepDirectBook4Or6Or7Or8Or11Or14Link = /Ewan\/(04-burnout-recovery|06-ride-the-wave|07-when-you-feel-down|08-getting-unstuck|11-mighty-mind|14-anxiety-support)\.html$/i.test(originalHref);

      if (image && card.tagName.toLowerCase() === "a" && !keepDirectBook4Or6Or7Or8Or11Or14Link) {
        const dynamicHref = buildFallbackReaderLink(content, image.getAttribute("src") || "");
        card.setAttribute("href", dynamicHref);
      }

      const directHref = card.getAttribute("href");
      if (directHref) {
        card.setAttribute("aria-label", `Open book: ${title}`);
        return;
      }

      const animateCard = (event) => {
        if (event.type === "keydown" && event.key !== "Enter" && event.key !== " ") {
          return;
        }
        if (event.type === "keydown") {
          event.preventDefault();
        }
        addRipple(card, event);
        card.classList.add("is-clicked");
        setTimeout(() => {
          card.classList.remove("is-clicked");
        }, 260);
        setTimeout(() => {
          openBookModal(content, card);
        }, 170);
      };

      card.addEventListener("click", animateCard);
      card.addEventListener("keydown", animateCard);
    });

    closeModalBtn.addEventListener("click", closeBookModal);

    modal.addEventListener("click", (event) => {
      if (event.target.matches("[data-close-modal]")) {
        closeBookModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !modal.hidden) {
        closeBookModal();
      }
    });
  </script>
</body>
</html>

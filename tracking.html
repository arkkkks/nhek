<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Your Mood</title>
<style>
  :root {
    --bg1: #ffe5f0;
    --bg2: #fff8dc;
    --card: rgba(255, 255, 255, 0.88);
    --ink: #2e2140;
    --muted: #6d607e;
    --accent: #b950d8;
    --accent2: #ff6fb0;
    --line: rgba(60, 28, 82, 0.14);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Segoe UI", Tahoma, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 10% 12%, #ffd1e8 0%, transparent 44%),
      radial-gradient(circle at 86% 16%, #ffe2b6 0%, transparent 42%),
      linear-gradient(145deg, var(--bg1), var(--bg2));
    padding: 22px 14px;
  }

  .top {
    max-width: 980px;
    margin: 0 auto 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .icon-btn {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: #fff;
    display: grid;
    place-items: center;
    font-size: 20px;
    cursor: pointer;
    transition: transform .18s ease, box-shadow .18s ease;
    box-shadow: 0 6px 18px rgba(30, 14, 44, 0.16);
  }

  .icon-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 22px rgba(30, 14, 44, 0.22);
  }

  .card {
    max-width: 980px;
    margin: 0 auto;
    background: var(--card);
    border: 1px solid rgba(255, 255, 255, 0.9);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 18px 42px rgba(30, 14, 44, 0.18);
  }

  h1 {
    margin: 0 0 6px;
    font-size: clamp(1.5rem, 3vw, 2.2rem);
  }

  .subtitle {
    margin: 0 0 16px;
    color: var(--muted);
    font-weight: 600;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }

  label { font-weight: 700; }
  select {
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 9px 10px;
    min-width: 210px;
    background: #fff;
    color: var(--ink);
    font-weight: 700;
  }

  .bars {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(96px, 1fr));
    gap: 12px;
  }

  .bar-container {
    background: rgba(255, 255, 255, 0.86);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 10px 8px;
    text-align: center;
  }

  .bar {
    width: 40px;
    height: 170px;
    margin: 0 auto;
    border-radius: 20px;
    background: #f0e9f5;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(62, 30, 83, 0.1);
  }

  .fill {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(180deg, var(--accent2), var(--accent));
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 4px;
  }

  .emoji {
    margin-top: 8px;
    font-size: 24px;
  }

  .name {
    margin-top: 4px;
    font-size: 12px;
    color: var(--muted);
    min-height: 32px;
  }

  .empty {
    font-weight: 700;
    color: var(--muted);
    padding: 16px 2px 6px;
  }
</style>
</head>
<body>

<div class="top">
  <button class="icon-btn" onclick="goBack()" aria-label="Back">←</button>
  <button class="icon-btn" onclick="goHome()" aria-label="Home">⌂</button>
</div>

<main class="card">
  <h1>Track Your Mood</h1>
  <p class="subtitle">Monthly distribution based on your saved calendar moods.</p>

  <div class="controls">
    <label for="monthPicker">Select Month:</label>
    <select id="monthPicker"></select>
  </div>

  <div id="bars" class="bars"></div>
</main>

<script>
  const monthPicker = document.getElementById("monthPicker");
  const bars = document.getElementById("bars");

  let emotionMap = {};

  function monthKey(date) {
    return `${date.getFullYear()}-${date.getMonth() + 1}`;
  }

  function monthLabel(date) {
    return date.toLocaleString("default", { month: "long", year: "numeric" });
  }

  function buildMonthOptions() {
    const now = new Date();
    const options = [];
    for (let i = 0; i < 12; i += 1) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      options.push({ key: monthKey(d), label: monthLabel(d) });
    }
    monthPicker.innerHTML = options
      .map((opt, idx) => `<option value="${opt.key}" ${idx === 0 ? "selected" : ""}>${opt.label}</option>`)
      .join("");
  }

  async function loadEmotionMap() {
    try {
      const response = await fetch("/api/mood/emotions");
      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.error || "Unable to load mood emotion labels");
      }

      if (Array.isArray(data.emotions)) {
        emotionMap = data.emotions.reduce((acc, item) => {
          if (item && typeof item.emoji === "string" && typeof item.name === "string") {
            acc[item.emoji] = item.name;
          }
          return acc;
        }, {});
      } else if (data && data.emotions && typeof data.emotions === "object") {
        emotionMap = data.emotions;
      } else {
        emotionMap = {};
      }
    } catch (error) {
      emotionMap = {};
      console.error(error);
    }
  }

  async function loadMoodEntries(month) {
    const response = await fetch(`/api/mood/entries?month=${encodeURIComponent(month)}`);
    const data = await response.json();
    if (!response.ok) {
      throw new Error(data.error || "Unable to load mood entries");
    }
    return data && data.entries && typeof data.entries === "object" ? data.entries : {};
  }

  function renderBars(entries) {
    const values = Object.values(entries);
    if (!values.length) {
      bars.innerHTML = '<p class="empty">No mood entries for this month yet.</p>';
      return;
    }

    const counts = {};
    values.forEach((emoji) => {
      counts[emoji] = (counts[emoji] || 0) + 1;
    });

    const total = values.length;
    const top = Object.entries(counts)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 7);

    bars.innerHTML = top.map(([emoji, count]) => {
      const percent = Math.round((count / total) * 100);
      const label = emotionMap[emoji] || "Mood";
      return `
        <div class="bar-container">
          <div class="bar">
            <div class="fill" style="height:${percent}%">${percent}%</div>
          </div>
          <div class="emoji">${emoji}</div>
          <div class="name">${label}</div>
        </div>
      `;
    }).join("");
  }

  async function refreshMonth() {
    try {
      const entries = await loadMoodEntries(monthPicker.value);
      renderBars(entries);
    } catch (error) {
      bars.innerHTML = '<p class="empty">Unable to load mood data right now.</p>';
      console.error(error);
    }
  }

  function goBack() {
    if (window.history.length > 1) {
      window.history.back();
      return;
    }
    goHome();
  }

  function goHome() {
    window.location.href = "Program Mental Health.html";
  }

  monthPicker.addEventListener("change", refreshMonth);

  async function bootstrap() {
    buildMonthOptions();
    await loadEmotionMap();
    await refreshMonth();
  }

  bootstrap();
</script>

</body>
</html>

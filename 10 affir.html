?<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily Positive Affirmations</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family: "Poppins", sans-serif;
    background-image: url('/IMAGES/UI%20VIOLET/65ecfa50-3cf0-4466-bb1c-e195124a6e65%20(1).jpg');
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    text-align:center;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
}

.icon-btn{
    background:#fff;
    border:none;
    border-radius:50%;
    width:45px;
    height:45px;
    font-size:20px;
    cursor:pointer;
    box-shadow:0 4px 8px rgba(0,0,0,0.15);
}

.subtitle{
    color:#6b3358;
    font-size:14px;
    margin-bottom:20px;
}

.container{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
    gap:15px;
    padding:20px;
    max-width:900px;
    margin:auto;
}

.card{
    background:#fff;
    border-radius:18px;
    padding:25px 15px;
    font-size:14px;
    cursor:pointer;
    position:relative;
    box-shadow:0 6px 12px rgba(0,0,0,0.15);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
}

.card.checked{
    border:3px solid #4CAF50;
}

.checkmark{
    position:absolute;
    top:10px;
    right:12px;
    font-size:20px;
    color:#4CAF50;
    display:none;
}

.card.checked .checkmark{
    display:block;
}

.done-btn{
    margin:30px auto;
    padding:14px 35px;
    border:none;
    border-radius:30px;
    background:#ff6fae;
    color:#fff;
    font-size:16px;
    cursor:pointer;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.icon-btn {
    position: fixed;
    top: 20px;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: #ff1493;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    cursor: pointer;
    z-index: 10;
}

.back {
    left: 20px;
}

.home {
    right: 20px;
}

h1 {
    color: #ff1493;
    font-size: 2.5em;
    margin: 0;
    font-weight: bold;
    font-family: 'Righteous', 'Arial Black', sans-serif;
    letter-spacing: 3px;
    text-shadow: 3px 3px 0px rgba(0,0,0,0.2), 6px 6px 0px rgba(255, 20, 147, 0.3);
    text-transform: uppercase;
}

/* POPUP */
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    display:none;
    align-items:center;
    justify-content:center;
}

.popup-content{
    background:#fff;
    padding:30px;
    border-radius:20px;
    width:80%;
    max-width:300px;
}

.popup-content h2{
    color:#8a2d5e;
}

.popup-buttons{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-top:15px;
}

.popup-buttons button{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#4CAF50;
    color:#fff;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- BACK BUTTON (GOES TO NEXT PAGE) -->
<div class="icon-btn back" onclick="goBack()">⬅</div>

<!-- HOME BUTTON -->
<div class="icon-btn home" onclick="goHome()">🏠</div>

<div class="title-container">
    <h1>Start Your Day with Positivity</h1>
</div>
<p class="subtitle">Click to mark ✔ • Double-click to remove ✔</p>

<div class="container" id="affirmationContainer"></div>

<button class="done-btn" onclick="showResult()">DONE</button>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="popup-content">
        <h2 id="resultText"></h2>
        <div class="popup-buttons">
            <button onclick="closePopup()">OK</button>
            <button onclick="goNext()">NEXT ➜</button>
        </div>
    </div>
</div>

<script>
// DAILY AFFIRMATIONS
const affirmationSets = [
[
"I am enough just as I am.",
"My feelings matter.",
"I am learning at my own pace.",
"It is okay to rest.",
"I am proud of my effort.",
"I choose calm today.",
"I believe in myself.",
"I deserve kindness.",
"I am growing every day.",
"I am not alone.",
"I am capable of achieving my goals.",
"My mental health is important, and I prioritize it.",
"I am resilient and can overcome obstacles.",
"I believe in my potential.",
"I deserve to feel confident and secure.",
"I am worthy of respect and understanding.",
"I trust myself to make the right decisions.",
"I am proud of who I am becoming.",
"I choose to see my strengths.",
"I am not defined by my challenges.",
"I embrace my unique qualities.",
"I am building a healthier mind every day.",
"My past does not limit my future.",
"I am deserving of love and compassion.",
"I choose to focus on progress, not perfection.",
"I am strong enough to face my fears.",
"I trust in my ability to heal and grow.",
"I am surrounded by support and care.",
"I celebrate my resilience and courage.",
"I am confident in my journey.",
"I let go of self-doubt and embrace self-belief."
],
[
"I welcome today with hope.",
"I can handle challenges.",
"My mind deserves peace.",
"I allow myself to breathe.",
"I am strong in my own way.",
"I trust the process.",
"I am doing my best.",
"I deserve good things.",
"I take one step at a time.",
"I choose positivity.",
"I embrace my journey with courage.",
"I am deserving of happiness and peace.",
"My thoughts do not control me; I control them.",
"I am strong enough to ask for help.",
"I celebrate my small victories.",
"I am building a positive mindset.",
"I trust in my ability to heal.",
"I am surrounded by support and love.",
"I choose to let go of self-doubt.",
"I am confident in my path to recovery.",
"I am worthy of success and joy.",
"I prioritize my well-being without guilt.",
"I am learning to love myself more each day.",
"I have the power to change my narrative.",
"I am not alone in my experiences.",
"I choose to be kind to my mind and body.",
"I am resilient in the face of adversity.",
"I believe in my capacity for growth.",
"I deserve to feel empowered and free.",
"I am creating a life filled with positivity."
]
];

// CHANGE DAILY
const todayIndex = new Date().getDate() % affirmationSets.length;
const affirmations = affirmationSets[todayIndex];

const container = document.getElementById("affirmationContainer");

// CREATE CARDS
affirmations.forEach(text => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<span class="checkmark">✔</span>${text}`;

    card.onclick = () => card.classList.toggle("checked");
    card.ondblclick = () => card.classList.remove("checked");

    container.appendChild(card);
});

// SHOW RESULT
function showResult(){
    const read = document.querySelectorAll(".card.checked").length;
    document.getElementById("resultText").innerText =
        `You read ${read}/${affirmations.length} affirmations today 🌸`;
    document.getElementById("popup").style.display = "flex";
}

// CLOSE POPUP
function closePopup(){
    document.getElementById("popup").style.display = "none";
}

function goBack(){
    if (window.history.length > 1) {
        window.history.back();
        return;
    }
    goHome();
}

// NEXT PAGE
function goNext(){
    window.location.href = "/Program%20Mental%20Health.html";
}

// HOME PAGE
function goHome(){
    window.location.href = "/Program%20Mental%20Health.html";
}
</script>

</body>
</html>

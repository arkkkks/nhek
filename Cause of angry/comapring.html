<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verses for Sadness</title>
    <!-- Elegant Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Great+Vibes&family=EB+Garamond:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-image:url("/IMAGES/Research%20UI%20(10).jpg");
            background-repeat:no-repeat;
            background-size: cover;
            font-family: Arial, sans-serif;
            background-color: #ffe6f2;
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Align to the left */
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0 20px 40px; /* Add left padding */
        }

        #header {
            text-align: left;
            margin-bottom: 20px;
            width: 100%;
        }

        #header h1 {
            font-family: 'Great Vibes', 'Playfair Display', 'EB Garamond', serif;
            font-size: 4em; /* Made heading bigger */
            color: #d63384;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-shadow: 2px 4px 18px #fff3fa, 0 1px 0 #a03c6e;
            margin-bottom: 10px;
            font-style: normal;
        }

        #header p {
            font-family: 'EB Garamond', 'Playfair Display', serif;
            font-size: 1.35em;
            color: #a03c6e;
            margin-top: 0;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .verse-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; /* 3 columns */
            gap: 18px 32px;
            justify-items: start;
            align-items: start;
            max-width: 700px;
            width: 100%;
        }

                .verse-button {
            background: linear-gradient(180deg, #fffaf2 0%, #ffe6bf 100%);
            color: #5f3f2f;
            border: 1px solid #e0b782;
            padding: 14px 22px;
            border-radius: 999px;
            cursor: pointer;
            box-shadow: 0 3px 0 #d29b67, 0 10px 18px rgba(95, 63, 47, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.85);
            transition: transform 0.15s ease-in-out, box-shadow 0.15s ease-in-out, filter 0.15s ease-in-out;
            text-decoration: none;
            font-size: 1.08em;
            text-align: left;
            min-width: 180px;
            font-family: 'EB Garamond', 'Playfair Display', serif;
            font-weight: 700;
            white-space: pre-line;
            line-height: 1.45;
        }

                .verse-button:hover {
            transform: translateY(-1px);
            filter: brightness(1.02);
            box-shadow: 0 4px 0 #d29b67, 0 14px 24px rgba(95, 63, 47, 0.24), inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        
                .verse-refresh-button {
            background: linear-gradient(180deg, #f3eaff 0%, #e4d2ff 100%);
            color: #4a2a70;
            border: 1px solid #c7a8f5;
            padding: 8px 14px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 700;
            margin-bottom: 16px;
            min-width: 128px;
            font-family: 'EB Garamond', 'Playfair Display', serif;
            box-shadow: 0 2px 0 #b594ea, 0 8px 14px rgba(100, 60, 150, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.9);
            transition: transform 0.15s ease-in-out, box-shadow 0.15s ease-in-out, filter 0.15s ease-in-out;
        }

                .verse-refresh-button:hover {
            transform: translateY(-1px);
            filter: brightness(1.03);
            box-shadow: 0 3px 0 #b594ea, 0 10px 18px rgba(100, 60, 150, 0.26), inset 0 1px 0 rgba(255, 255, 255, 0.95);
        }
        .verse-refresh-button:active {
            transform: translateY(1px);
            box-shadow: 0 1px 0 #b594ea, 0 6px 10px rgba(100, 60, 150, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        #jesus-image {
            margin-top: 30px;
        }

        #jesus-image img {
            width: 200px;
            height: auto;
        }

        /* Back and Home Buttons */
        .icon-btn {
            position: fixed;
            top: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(245, 230, 245, 0.95));
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 20;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(254, 197, 229, 0.4);
            border: 2px solid rgba(254, 197, 229, 0.5);
            text-decoration: none;
        }

        .back {
            left: 20px;
        }

        .home {
            right: 20px;
        }

        .icon-btn:hover {
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            transform: scale(1.15) rotate(10deg);
            box-shadow: 0 12px 35px rgba(255, 20, 147, 0.6);
            border-color: rgba(255, 20, 147, 0.8);
            color: white;
        }

        .icon-btn:active {
            transform: scale(1.05) rotate(10deg);
        }
    </style>
</head>
<body>
    <!-- BACK BUTTON -->
    <a class="icon-btn back" href="/CAUSES%20OF%20THE%20EMOTION/Cause%20of%20anger.html">&#8592;</a>

    <!-- HOME BUTTON -->
    <a class="icon-btn home" href="/Program%20Mental%20Health.html">&#127968;</a>

    <div id="header">
        <h1>Comparing their life to others on social media</h1>
        <p>Here are the verses that will help you.</p>
    </div>

        <button class="verse-button verse-refresh-button" type="button" onclick="refreshVerses()">Get New Verse</button>

    <div class="verse-container" id="verseContainer">
    </div>

        <script>
        const verses = [{"href":"../message/anger-proverbs-15-1.html","text":"Proverbs 15:1"},{"href":"../message/anger-james-1-19-20.html","text":"James 1:19-20"},{"href":"../message/anger-ephesians-4-26.html","text":"Ephesians 4:26"},{"href":"../message/anger-proverbs-14-29.html","text":"Proverbs 14:29"},{"href":"../message/anger-colossians-3-8.html","text":"Colossians 3:8"},{"href":"../message/anger-proverbs-16-32.html","text":"Proverbs 16:32"},{"href":"../message/anger-ecclesiastes-7-9.html","text":"Ecclesiastes 7:9"},{"href":"../message/anger-romans-12-21.html","text":"Romans 12:21"},{"href":"../message/anger-psalm-37-8.html","text":"Psalm 37:8"},{"href":"../message/anger-ephesians-4-31-32.html","text":"Ephesians 4:31-32"}];

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function displayVerses() {
            const container = document.getElementById('verseContainer');
            const shuffled = shuffleArray(verses);
            const selected = shuffled.slice(0, Math.min(9, verses.length));

            container.innerHTML = selected.map(verse =>
                `<a href="${verse.href}" class="verse-button" onclick="sessionStorage.setItem('lastAngerVersePage', window.location.href)">${verse.text}</a>`
            ).join('');
        }

        function refreshVerses() {
            displayVerses();
        }

        displayVerses();
    </script>
</body>
</html>

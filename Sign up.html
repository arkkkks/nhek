<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Portal Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<script>
const API_BASE = "";

async function handleNavigate(event){
    event.preventDefault();

    const username = document.getElementById("signup-username").value.trim();
    const email = document.getElementById("signup-email").value.trim();
    const password = document.getElementById("signup-password").value;

    if(!username || !email || !password){
        alert("Please enter username, email, and password.");
        return false;
    }

    try {
        const response = await fetch(`${API_BASE}/api/signup`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ username, email, password })
        });
        const result = await response.json();

        if(!response.ok){
            alert(result.error || "Sign-up failed. Please try again.");
            return false;
        }

        const overlay = document.getElementById("overlay");
        overlay.classList.add("active");

        setTimeout(() => {
            window.location.href = "Log in.html";
        }, 450);
        return true;
    } catch (error) {
        alert("Cannot reach the backend server. Start backend/server.js first.");
        return false;
    }
}
</script>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron', sans-serif;
}

body{
    height:100vh;
    background:
        radial-gradient(circle at 15% 15%, #12264c 0%, transparent 42%),
        radial-gradient(circle at 82% 18%, #0d3458 0%, transparent 35%),
        linear-gradient(140deg, #050b16 0%, #071327 55%, #0a1f3c 100%);
    overflow:hidden;
    position:relative;
}

body::before,
body::after{
    content:"";
    position:fixed;
    border-radius:50%;
    pointer-events:none;
    z-index:-2;
    filter:blur(1px);
}

body::before{
    width:330px;
    height:330px;
    left:-90px;
    bottom:-120px;
    background:radial-gradient(circle, rgba(103,216,255,0.32), rgba(103,216,255,0));
    animation:blobDrift 13s ease-in-out infinite alternate;
}

body::after{
    width:280px;
    height:280px;
    right:-70px;
    top:-95px;
    background:radial-gradient(circle, rgba(61,124,255,0.28), rgba(61,124,255,0));
    animation:blobDrift 10s ease-in-out infinite alternate-reverse;
}

@keyframes blobDrift{
    0%{
        transform:translate3d(0,0,0) scale(1);
    }
    100%{
        transform:translate3d(26px,-35px,0) scale(1.12);
    }
}

/* PARTICLES */
canvas{
    position:fixed;
    inset:0;
    z-index:-1;
}

.emotion-float-layer{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
    overflow:hidden;
}

.emotion-float{
    position:absolute;
    font-size:clamp(34px,4vw,62px);
    opacity:0.24;
    filter:drop-shadow(0 6px 12px rgba(0,0,0,0.35));
    animation-name:emotionRise;
    animation-timing-function:linear;
    animation-iteration-count:infinite;
}

.emotion-float:nth-child(1){ left:8%;  top:111%; animation-duration:19s; animation-delay:-2s; }
.emotion-float:nth-child(2){ left:16%; top:109%; animation-duration:21s; animation-delay:-8s; }
.emotion-float:nth-child(3){ left:26%; top:113%; animation-duration:22s; animation-delay:-5s; }
.emotion-float:nth-child(4){ left:35%; top:108%; animation-duration:18s; animation-delay:-10s; }
.emotion-float:nth-child(5){ left:46%; top:112%; animation-duration:23s; animation-delay:-7s; }
.emotion-float:nth-child(6){ left:56%; top:110%; animation-duration:20s; animation-delay:-11s; }
.emotion-float:nth-child(7){ left:66%; top:114%; animation-duration:24s; animation-delay:-12s; }
.emotion-float:nth-child(8){ left:76%; top:109%; animation-duration:19s; animation-delay:-13s; }
.emotion-float:nth-child(9){ left:86%; top:113%; animation-duration:22s; animation-delay:-9s; }
.emotion-float:nth-child(10){ left:94%; top:110%; animation-duration:18s; animation-delay:-14s; }
.emotion-float:nth-child(11){ left:12%; top:116%; animation-duration:25s; animation-delay:-15s; }
.emotion-float:nth-child(12){ left:42%; top:115%; animation-duration:24s; animation-delay:-16s; }

@keyframes emotionRise{
    0%{
        transform:translateY(0) translateX(0) rotate(0deg) scale(0.95);
        opacity:0;
    }
    12%{
        opacity:0.24;
    }
    85%{
        opacity:0.2;
    }
    100%{
        transform:translateY(-125vh) translateX(20px) rotate(16deg) scale(1.08);
        opacity:0;
    }
}

/* CENTER */
.container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    z-index:1;
}

/* SIGNUP CARD */
.signup-box{
    width:380px;
    padding:40px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(18px);
    border-radius:16px;
    box-shadow:0 0 40px rgba(255,0,255,0.45);
    border:1px solid rgba(255,0,255,0.3);
    text-align:center;
}

.signup-box h2{
    color:#ff4dff;
    margin-bottom:25px;
    letter-spacing:3px;
}

.signup-box .subtitle{
    margin-top:-12px;
    margin-bottom:24px;
    color:#d7d7f0;
    font-size:12px;
    letter-spacing:0.6px;
}

.input-box{
    position:relative;
    margin-bottom:25px;
}

.input-box input{
    width:100%;
    padding:12px;
    background:transparent;
    border:none;
    outline:none;
    color:#fff;
    border-bottom:2px solid #ff4dff;
}

.input-box label{
    position:absolute;
    left:0;
    top:50%;
    transform:translateY(-50%);
    color:#bbb;
    pointer-events:none;
    transition:.3s;
}

.input-box input:focus + label,
.input-box input:valid + label{
    top:-8px;
    font-size:11px;
    color:#ff4dff;
}

button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:30px;
    background:linear-gradient(90deg,#ff00ff,#8f00ff);
    font-weight:600;
    cursor:pointer;
}

button:hover{
    box-shadow:0 0 20px #ff4dff;
}

.back{
    margin-top:20px;
    font-size:12px;
    color:#ccc;
}

.back a{
    color:#ff4dff;
    text-decoration:none;
}

/* Page Transition Overlay */
.transition-overlay{
    position:fixed;
    inset:0;
    background:linear-gradient(90deg,#ff00ff,#8f00ff);
    z-index:9999;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.5s ease;
}

.transition-overlay.active{
    opacity:1;
    pointer-events:all;
}

/* Custom Popup Modal */
.popup-modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:10000;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.3s ease;
}

.popup-modal.active{
    opacity:1;
    pointer-events:all;
}

.popup-content{
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,0,255,0.5);
    border-radius:16px;
    padding:40px;
    text-align:center;
    box-shadow:0 0 40px rgba(255,0,255,0.5);
    transform:scale(0.8);
    transition:transform 0.3s ease;
}

.popup-modal.active .popup-content{
    transform:scale(1);
}

.popup-content h3{
    color:#ff4dff;
    margin-bottom:15px;
    font-size:24px;
}

.popup-content p{
    color:#fff;
    margin-bottom:25px;
}

.popup-content button{
    width:auto;
    padding:12px 40px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>
<div class="emotion-float-layer" aria-hidden="true">
    <span class="emotion-float">&#128522;</span>
    <span class="emotion-float">&#129392;</span>
    <span class="emotion-float">&#128524;</span>
    <span class="emotion-float">&#128546;</span>
    <span class="emotion-float">&#129321;</span>
    <span class="emotion-float">&#128150;</span>
    <span class="emotion-float">&#10024;</span>
    <span class="emotion-float">&#129782;</span>
    <span class="emotion-float">&#127800;</span>
    <span class="emotion-float">&#127769;</span>
    <span class="emotion-float">&#128519;</span>
    <span class="emotion-float">&#9729;&#65039;</span>
</div>

<div class="transition-overlay" id="overlay"></div>

<div class="container">
    <div class="signup-box">
        <h2>Sign Up</h2>
        <p class="subtitle">Create your account to save your progress.</p>

        <div class="input-box">
            <input id="signup-username" type="text" required>
            <label>Username</label>
        </div>

        <div class="input-box">
            <input id="signup-email" type="email" required>
            <label>Email</label>
        </div>

        <div class="input-box">
            <input id="signup-password" type="password" required>
            <label>Password</label>
        </div>
        <button onclick="handleNavigate(event)">Create Account</button>


        <div class="back">
            Already have an account?
            <a href="Log in.html">Log In</a>
        </div>
    </div>
</div>

<script>
/* PARTICLES + MOUSE INTERACTION */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = [];
let mouse = { x:null, y:null, radius:120 };

addEventListener("mousemove", e=>{
    mouse.x = e.x;
    mouse.y = e.y;
});

addEventListener("mouseout", ()=>{
    mouse.x = null;
    mouse.y = null;
});

class Particle{
    constructor(){
        this.x = Math.random()*canvas.width;
        this.y = Math.random()*canvas.height;
        this.size = Math.random()*2 + 1;
        this.vx = Math.random()*0.8 - 0.4;
        this.vy = Math.random()*0.8 - 0.4;
    }

    update(){
        this.x += this.vx;
        this.y += this.vy;

        if(this.x<0 || this.x>canvas.width) this.vx*=-1;
        if(this.y<0 || this.y>canvas.height) this.vy*=-1;

        if(mouse.x){
            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if(dist < mouse.radius){
                this.x -= dx/15;
                this.y -= dy/15;
            }
        }
    }

    draw(){
        ctx.fillStyle = "#ff4dff";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

function connect(){
    for(let a=0;a<particles.length;a++){
        for(let b=a;b<particles.length;b++){
            let dx = particles[a].x - particles[b].x;
            let dy = particles[a].y - particles[b].y;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if(dist < 120){
                ctx.strokeStyle = `rgba(255,77,255,${1-dist/120})`;
                ctx.lineWidth = 0.7;
                ctx.beginPath();
                ctx.moveTo(particles[a].x,particles[a].y);
                ctx.lineTo(particles[b].x,particles[b].y);
                ctx.stroke();
            }
        }
    }
}

function init(){
    particles=[];
    for(let i=0;i<140;i++) particles.push(new Particle());
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{p.update();p.draw();});
    connect();
    requestAnimationFrame(animate);
}

addEventListener("resize",()=>{
    canvas.width = innerWidth;
    canvas.height = innerHeight;
    init();
});

init();
animate();
</script>

</body>
</html>

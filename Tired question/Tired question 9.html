<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@600;700&display=swap');
  :root {
    --bg1: #26063f;
    --bg2: #4c1179;
    --bg3: #7b1fa2;
    --bg4: #d81b8a;
    --panel: rgba(255, 255, 255, 0.14);
    --panel-border: rgba(255, 255, 255, 0.34);
    --text: #fff6ff;
    --muted: #f5dbff;
    --option: rgba(255, 255, 255, 0.2);
    --option-hover: rgba(255, 255, 255, 0.28);
    --accent: #ff6ad5;
    --accent-2: #c084fc;
    --ok: #8dffba;
    --bad: #ffb3cf;
    --shadow: rgba(16, 2, 28, 0.45);
  }
  * {
    box-sizing: border-box;
  }
  html,
  body {
    margin: 0;
    min-height: 100%;
  }
  body {
    font-family: 'Outfit', sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 22px 14px;
    position: relative;
    overflow-x: hidden;
    background: linear-gradient(-45deg, var(--bg1), var(--bg2), var(--bg3), var(--bg4));
    background-size: 300% 300%;
    animation: bgFlow 18s ease infinite;
    isolation: isolate;
  }
  body::before,
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    background:
      radial-gradient(circle at 10% 18%, rgba(255, 106, 213, 0.28), transparent 42%),
      radial-gradient(circle at 86% 14%, rgba(192, 132, 252, 0.32), transparent 45%),
      radial-gradient(circle at 50% 84%, rgba(255, 255, 255, 0.16), transparent 48%);
    animation: glowPulse 8s ease-in-out infinite alternate;
  }
  body::after {
    background:
      repeating-linear-gradient(
        90deg,
        rgba(255, 255, 255, 0.05) 0,
        rgba(255, 255, 255, 0.05) 1px,
        transparent 1px,
        transparent 48px
      ),
      repeating-linear-gradient(
        0deg,
        rgba(255, 255, 255, 0.03) 0,
        rgba(255, 255, 255, 0.03) 1px,
        transparent 1px,
        transparent 48px
      );
    mask-image: radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0.78), transparent 88%);
    animation: gridDrift 20s linear infinite;
    opacity: 0.34;
  }
  .quiz-box {
    position: relative;
    z-index: 1;
    width: min(800px, 100%);
    border-radius: 22px;
    padding: 22px;
    color: var(--text);
    background: var(--panel);
    border: 1.5px solid var(--panel-border);
    box-shadow: 0 18px 40px var(--shadow);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    animation: boxEnter 0.5s ease both;
  }
  h1 {
    margin: 0 0 12px;
    font-size: clamp(1.35rem, 2.7vw, 2rem);
    font-family: 'Space Grotesk', sans-serif;
    letter-spacing: 0.03em;
    text-wrap: balance;
    text-shadow: 0 8px 20px rgba(18, 2, 34, 0.5);
  }
  h2 {
    margin: 0;
    border-radius: 14px;
    padding: 14px;
    text-align: center;
    font-size: clamp(1rem, 1.8vw, 1.15rem);
    font-weight: 700;
    color: #fff6ff;
    background: linear-gradient(135deg, rgba(119, 24, 160, 0.88), rgba(214, 51, 173, 0.88));
    border: 1px solid rgba(255, 255, 255, 0.24);
    text-wrap: pretty;
  }
  .options {
    margin-top: 18px;
    display: grid;
    gap: 10px;
  }
  .option {
    width: 100%;
    text-align: left;
    border-radius: 12px;
    margin: 0;
    border: 1px solid rgba(255, 255, 255, 0.28);
    background: var(--option);
    color: #fff6ff;
    padding: 14px 42px 14px 14px;
    font-size: 0.97rem;
    font-weight: 600;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
  }
  .option:hover {
    transform: translateY(-2px);
    background: var(--option-hover);
    border-color: rgba(255, 255, 255, 0.42);
    box-shadow: 0 8px 18px rgba(20, 2, 32, 0.3);
  }
  .option:focus-visible,
  .submit-btn:focus-visible {
    outline: 2px solid rgba(255, 106, 213, 0.95);
    outline-offset: 2px;
  }
  .option.selected {
    border-color: rgba(255, 106, 213, 0.95);
    box-shadow: 0 0 0 4px rgba(255, 106, 213, 0.2);
    transform: translateY(-1px);
  }
  .option.correct {
    border-color: rgba(141, 255, 186, 0.95);
    background: rgba(62, 146, 94, 0.28);
  }
  .option.wrong {
    border-color: rgba(255, 179, 207, 0.95);
    background: rgba(148, 52, 98, 0.3);
  }
  .option.correct::after {
    content: '\2713';
    color: var(--ok);
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-weight: 800;
    font-size: 1.12rem;
  }
  .option.wrong::after {
    content: '\2715';
    color: var(--bad);
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-weight: 800;
    font-size: 1rem;
  }
  .submit-btn {
    margin-top: 14px;
    width: 100%;
    border: none;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: #fff;
    background: linear-gradient(135deg, #d946ef, #a855f7);
    box-shadow: 0 10px 20px rgba(57, 4, 85, 0.36);
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .submit-btn:hover {
    transform: translateY(-2px);
    filter: brightness(1.05);
    box-shadow: 0 14px 28px rgba(57, 4, 85, 0.42);
  }
  .submit-btn:active {
    transform: scale(0.98);
  }
  p {
    text-align: center;
    font-size: 0.83rem;
    margin-top: 10px;
    color: var(--muted);
  }
  .ripple {
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.45);
    transform: translate(-50%, -50%) scale(0);
    pointer-events: none;
    animation: rippleOut 0.58s ease-out forwards;
  }
  @keyframes bgFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  @keyframes glowPulse {
    from { transform: scale(1); opacity: 0.85; }
    to { transform: scale(1.08); opacity: 1; }
  }
  @keyframes gridDrift {
    from { transform: translateY(0); }
    to { transform: translateY(48px); }
  }
  @keyframes boxEnter {
    from { opacity: 0; transform: translateY(12px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes rippleOut {
    to {
      transform: translate(-50%, -50%) scale(16);
      opacity: 0;
    }
  }
  @media (max-width: 768px) {
    body {
      align-items: flex-start;
      padding-top: 16px;
      padding-bottom: 16px;
    }
    .quiz-box {
      padding: 16px;
      border-radius: 16px;
    }
    .option {
      font-size: 0.93rem;
      padding: 12px 38px 12px 12px;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }
  }
</style>
</head>
<body>

<div class="quiz-box">
  <h1>Tired Question 9</h1>
  <h2>A student feels tired from overthinking. What should they do?</h2>

  <div class="options">
    <button class="option" data-correct="true">A. Practice mindfulness.</button>
    <button class="option" data-correct="false">B. Worry more.</button>
    <button class="option" data-correct="false">C. Stay up thinking.</button>
    <button class="option" data-correct="false">D. Ignore it.</button>
  </div>

  <button class="submit-btn">Submit</button>
  <p>Your name will not be shared</p>
</div>

<script src="../quiz-engine.js"></script>

<script id="purple-theme-effects">
  (function () {
    const clickables = document.querySelectorAll('.option, .submit-btn');
    function ripple(event, element) {
      const rect = element.getBoundingClientRect();
      const dot = document.createElement('span');
      dot.className = 'ripple';
      const hasPoint = event && typeof event.clientX === 'number' && typeof event.clientY === 'number';
      const x = hasPoint ? event.clientX - rect.left : rect.width / 2;
      const y = hasPoint ? event.clientY - rect.top : rect.height / 2;
      dot.style.left = x + 'px';
      dot.style.top = y + 'px';
      element.appendChild(dot);
      dot.addEventListener('animationend', () => dot.remove(), { once: true });
    }
    clickables.forEach((element) => {
      element.addEventListener('pointerdown', (event) => ripple(event, element));
    });
    document.querySelectorAll('.option').forEach((option) => {
      option.setAttribute('tabindex', '0');
      option.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          ripple(null, option);
          option.click();
        }
      });
    });
  })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mood Selector</title>

<link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">

<style>
/* ===================== YOUR ORIGINAL DESIGN ===================== */
body {
    background-color: #ffe6f2;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
}

.title-container {
    background-color: #ffffff;
    padding: 20px 50px;
    border-radius: 50px;
    margin-top: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

.title-container h1 {
    color: #ff1493;
    font-size: 2.5em;
    margin: 0;
    font-family: 'Righteous', sans-serif;
}

.emotion-wheel {
    position: relative;
    width: 500px;
    height: 500px;
    border-radius: 50%;
}

.rotation-arrow {
    position: absolute;
    left: 50%;
    top: -60px;
    transform: translateX(-50%);
    font-size: 60px;
}

.emotion {
    position: absolute;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    text-align: center;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #d63384;
    color: #fff;
    font-weight: bold;
    transition: .3s;
}
.emotion:hover { transform: scale(1.1); }

/* CAUSE PAGE */
.cause {
    display: block;
    margin: 10px;
    padding: 12px 25px;
    background: #d8b4fe;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

/* VERSE PAGE */
.verse-box {
    background: white;
    padding: 30px;
    border-radius: 20px;
    max-width: 600px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

button {
    margin-top: 20px;
    padding: 10px 30px;
    border: none;
    border-radius: 20px;
    background: #d63384;
    color: white;
    cursor: pointer;
}

/* SECTION CONTROL */
.section { display: none; }
.active { display: block; }

</style>
</head>

<body>

<div class="title-container">
    <h1>What are you feeling today?</h1>
</div>

<!-- ================= EMOTION PAGE ================= -->
<div id="emotionPage" class="section active">
    <div class="emotion-wheel" id="wheel">
        <div class="rotation-arrow">⬇</div>
    </div>
</div>

<!-- ================= CAUSE PAGE ================= -->
<div id="causePage" class="section">
    <h2 id="causeTitle"></h2>
    <div id="causeContainer"></div>
    <button onclick="backToEmotions()">⬅ Back</button>
</div>

<!-- ================= VERSE PAGE ================= -->
<div id="versePage" class="section">
    <div class="verse-box">
        <h2 id="verseRef"></h2>
        <p id="verseText"></p>
        <hr>
        <p id="verseMessage"></p>
    </div>
    <button onclick="showVerse()">Show Another Verse</button>
    <button onclick="backToCauses()">⬅ Back</button>
</div>

/* ===================== WHEEL LAYOUT ===================== */

const wheel = document.getElementById("wheel");
const radius = 200;
const center = 250;

emotions.forEach((emotion, i) => {
    const angle = (2 * Math.PI * i) / emotions.length - Math.PI / 2;
    const x = center + radius * Math.cos(angle) - 50;
    const y = center + radius * Math.sin(angle) - 50;

    const div = document.createElement("div");
    div.className = "emotion";
    div.innerText = emotion.name;
    div.style.left = x + "px";
    div.style.top = y + "px";
    div.onclick = () => selectEmotion(emotion.key);
    wheel.appendChild(div);
});

/* ===================== FLOW ===================== */

let currentEmotion = "";
const lastVerseIndexByEmotion = {};

function selectEmotion(emotionKey){
    currentEmotion = emotionKey;
    showCauses();
}

function showCauses(){
    const container = document.getElementById("causeContainer");
    container.innerHTML = "";

    const list = causes[currentEmotion] || causes.default;

    list.forEach(cause=>{
        const btn = document.createElement("button");
        btn.className = "cause";
        btn.innerText = cause;
        btn.onclick = showVerse;
        container.appendChild(btn);
    });

    document.getElementById("causeTitle").innerText =
        "Causes of feeling " + currentEmotion;

    switchPage("causePage");
}

function showVerse(){
    const emotionVerses = versesByEmotion[currentEmotion] || versesByEmotion.default || verses;
    if (!emotionVerses.length) return;

    let index = Math.floor(Math.random() * emotionVerses.length);
    const previousIndex = lastVerseIndexByEmotion[currentEmotion];

    if (emotionVerses.length > 1 && index === previousIndex) {
        index = (index + 1) % emotionVerses.length;
    }

    lastVerseIndexByEmotion[currentEmotion] = index;
    const v = emotionVerses[index];

    document.getElementById("verseRef").innerText = v.ref;
    document.getElementById("verseText").innerText = v.text;
    document.getElementById("verseMessage").innerText = v.message;

    switchPage("versePage");
}

function backToEmotions(){ switchPage("emotionPage"); }
function backToCauses(){ switchPage("causePage"); }

function switchPage(pageId){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(pageId).classList.add("active");
}
</script>

</body>
</html>

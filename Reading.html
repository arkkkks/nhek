<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Disappointment — Get Unstuck (summary)</title>
<style>
  :root{
    --bg1: #2b1f16;
    --bg2: #3b2b22;
    --book-bg: #f5e9d8;
    --paper-edge: #d9c6ad;
    --ink: #222;
    --accent: #2b79c6;
    --shadow: rgba(0,0,0,.45);
    --page-width: 780px;
    --page-height: 520px;
  }

  /* Page & background */
  html,body{height:100%;margin:0;font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;background:linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--ink);}
  .library {
    min-height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
    box-sizing:border-box;
    background-image:
      radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.05));
    background-size: 120px 120px, 100% 100%;
  }

  /* Title bar */
  .title-bar{
    position:fixed;
    top:18px;
    left:50%;
    transform:translateX(-50%);
    z-index:30;
    display:flex;
    align-items:center;
    gap:14px;
    background:linear-gradient(180deg,#fff 0%, #f0f6ff 50%);
    padding:10px 18px;
    border-radius:10px;
    box-shadow: 0 6px 18px rgba(0,0,0,.35);
    border: 2px solid rgba(0,0,0,.06);
    font-weight:700;
    letter-spacing:1px;
  }
  .title-bar .badge{background:var(--accent);color:#fff;padding:6px 10px;border-radius:6px;font-size:14px;font-weight:700;}
  .title-bar .titletext{font-size:18px;}

  /* Book container */
  .book-wrap{
    width:calc(var(--page-width) + 40px);
    max-width:calc(100% - 40px);
    perspective:1400px;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* Shadow under book */
  .book-shadow{
    position:absolute;
    bottom:-22px;
    left:50%;
    transform:translateX(-50%);
    width:calc(var(--page-width) + 60px);
    height:36px;
    filter:blur(20px);
    background:radial-gradient(ellipse at center, rgba(0,0,0,.45), transparent 50%);
    z-index:1;
    opacity:.9;
  }

  /* Book */
  .book {
    width:var(--page-width);
    height:var(--page-height);
    background: linear-gradient(180deg,#e9dcc6, #f7efe0 60%);
    border-radius:12px;
    box-shadow: 0 20px 60px rgba(0,0,0,.45);
    display:flex;
    overflow:hidden;
    transform-origin:center center;
    position:relative;
    z-index:10;
  }

  /* Pages (left + right) */
  .page {
    width:50%;
    height:100%;
    padding:46px 46px;
    box-sizing:border-box;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    gap:10px;
    background-clip:padding-box;
    position:relative;
    overflow:auto;
  }

  /* inner paper area with subtle paper texture */
  .page .paper{
    height:100%;
    background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
    padding:18px;
    border-radius:4px;
    font-size:16px;
    line-height:1.6;
    color:var(--ink);
    font-family: "PT Serif", "Times New Roman", Times, serif;
  }

  /* faint book fold */
  .spine {
    position:absolute;
    left:50%;
    top:0;
    bottom:0;
    width:12px;
    transform:translateX(-50%);
    background:linear-gradient(90deg,#cdbfa7,#e9dcc6 40%, #cdbfa7);
    box-shadow: inset 0 0 30px rgba(0,0,0,.08);
    z-index:11;
  }

  /* Page edges */
  .book:before, .book:after{
    content:"";
    position:absolute;
    top:0;
    bottom:0;
    width:28px;
    z-index:5;
    pointer-events:none;
    background:linear-gradient(90deg, rgba(0,0,0,0.04), rgba(0,0,0,0));
  }
  .book:before{ left:0; transform:skewX(-6deg); }
  .book:after{ right:0; transform:skewX(6deg); }

  /* controls */
  .controls {
    margin-top:18px;
    display:flex;
    gap:12px;
    align-items:center;
    justify-content:center;
    user-select:none;
  }
  .btn {
    background:#fff;
    border:1px solid rgba(0,0,0,.08);
    padding:10px 16px;
    border-radius:8px;
    box-shadow: 0 4px 10px rgba(0,0,0,.12);
    cursor:pointer;
    font-weight:700;
    display:inline-flex;
    gap:8px;
    align-items:center;
  }
  .btn:active{transform:translateY(1px);}
  .btn[disabled]{opacity:.45; cursor:not-allowed;}

  .page-btn {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
  }

  .page-btn-prev {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
  }

  .page-meta {
    font-size:13px;
    color:#444;
    margin-left:8px;
  }

  /* page turn animation */
  .turning {
    transition: transform 650ms cubic-bezier(.2,.9,.3,1), box-shadow 650ms;
  }
  .turn-left {
    transform-origin:left center;
    transform: rotateY(16deg) translateX(-6px) scale(.998);
    box-shadow: -20px 30px 60px rgba(0,0,0,.25);
  }
  .turn-right {
    transform-origin:right center;
    transform: rotateY(-16deg) translateX(6px) scale(.998);
    box-shadow: 20px 30px 60px rgba(0,0,0,.25);
  }

  /* responsive tweaks */
  @media (max-width:1000px){
    :root{ --page-width: 700px; --page-height: 460px; }
  }
  @media (max-width:820px){
    .book { width:calc(var(--page-width) - 120px); }
    :root{ --page-width: 540px; --page-height: 460px; }
  }
  @media (max-width:560px){
    .book { flex-direction:column; height:auto; width:95%; padding-bottom:18px;}
    .page { width:100%; min-height:240px; }
    .spine{ display:none; }
    .book:before, .book:after { display:none; }
  }

  /* small caption footer inside book */
  .attribution{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    z-index:20;
    color:rgba(0,0,0,.45);
    font-size:12px;
    background:rgba(255,255,255,.6);
    padding:6px 10px;
    border-radius:6px;
    border:1px solid rgba(0,0,0,.04);
  }

  /* scrollbar nice */
  .page::-webkit-scrollbar{width:8px;}
  .page::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:6px}
</style>
</head>
<body>
  <div class="title-bar" role="banner" aria-label="Story title">
    <div class="badge">STORY</div>
    <div class="titletext">DISAPPOINTMENT</div>
  </div>

  <div class="library" role="main">
    <div class="book-wrap" aria-live="polite">
      <div class="book-shadow" aria-hidden="true"></div>

      <div id="book" class="book turning" tabindex="0" aria-label="Open book showing story pages">
        <div class="page left-page" aria-hidden="false">
          <div class="paper" id="leftContent" tabindex="0"></div>
          <button class="page-btn page-btn-prev" id="leftPrevBtn" onclick="goPrev()">Prev</button>
          <button class="page-btn" id="leftNextBtn" onclick="goNext()">Next</button>
        </div>

        <div class="spine" aria-hidden="true"></div>

        <div class="page right-page" aria-hidden="false">
          <div class="paper" id="rightContent" tabindex="0"></div>
          <button class="page-btn page-btn-prev" id="rightPrevBtn" onclick="goPrev()">Prev</button>
          <button class="page-btn" id="rightNextBtn" onclick="goNext()">Next</button>
        </div>

        <div class="attribution" aria-hidden="false">
          A concise summary &nbsp;•&nbsp; inspired by "Get Unstuck from Disappointment" — Gill Hasson
        </div>
      </div>

    </div>
  </div>

  <div style="position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:40;">
    <div class="controls" role="navigation" aria-label="Book navigation">
      <button id="prevBtn" class="btn" aria-label="Previous page (left arrow)">
        ← Prev
      </button>
      <div class="page-meta" id="pageMeta">Page 1 / 8</div>
      <button id="nextBtn" class="btn" aria-label="Next page (right arrow)">
        Next →
      </button>
    </div>
    <div style="text-align:center;margin-top:8px;color:#ddd;font-size:12px;">
      Tip: use ← and → keys to navigate
    </div>
  </div>

<script>
/*
  Single-file Book viewer
  - Uses spreads (left + right) array below.
  - Simple page-turn animation + keyboard navigation.
  - Edit text inside `spreads` to change content.
*/

/* Each spread is an object with left and right HTML strings.
   Write plain paragraphs; small HTML like <strong>, <em>, <ul> allowed.
*/
const spreads = [
  {
    left: `<h3 style="margin-top:2px;margin-bottom:8px;">Introduction</h3>
           <p>Disappointment is part of life. It comes when expectations meet a different reality — from small plans that fail to larger hopes that don't work out. The important part isn't that we feel disappointment, but what we do next: it's possible to get unstuck and move forward with purpose.</p>`,
    right: `<h4 style="margin-top:2px;margin-bottom:8px;">Why it matters</h4>
            <p>Lingering disappointment can sap energy, lower confidence, and stop us trying again. Understanding how disappointment works gives you the power to respond in ways that help you recover, learn, and re-engage with life.</p>`
  },
  {
    left: `<h4>1. Allow the feeling</h4>
           <p>First, give yourself permission to feel disappointed. Trying to push the feeling away makes it louder. Name it: "I feel disappointed." That simple step reduces overwhelm and makes it easier to think clearly.</p>`,
    right: `<h4>2. Notice your story</h4>
            <p>We often tell ourselves stories about why something failed ("I wasn't good enough", "It was unfair"). Notice those thoughts without immediately accepting them. Are they facts or interpretations? Separating facts from the story helps you choose a healthier response.</p>`
  },
  {
    left: `<h4>3. Learn, don't blame</h4>
           <p>Ask what you can learn rather than only blaming yourself or others. What went wrong? What was out of your control? What could you do differently next time? This turns disappointment into fuel for growth.</p>`,
    right: `<h4>4. Lower unhelpful expectations</h4>
            <p>Sometimes disappointment follows unrealistic expectations. Recalibrate: set goals that stretch you but are also achievable. Smaller, clearer steps reduce the risk of being knocked off track.</p>`
  },
  {
    left: `<h4>5. Take one small action</h4>
           <p>To get unstuck, choose one small, concrete action — even a tiny step. A short action builds momentum and proves you can move forward. Progress, not perfection, is the aim.</p>`,
    right: `<h4>6. Build a short plan</h4>
            <p>Sketch a simple plan: next step, timeline, and one person who can help. Writing it down converts vague hopes into practical moves and reduces the chance you'll drift back into passivity.</p>`
  },
  {
    left: `<h4>7. Use support</h4>
           <p>Talk with someone you trust: a friend, mentor, or counselor. Other perspectives can calm you, spot options you missed, and remind you of the strengths you still have.</p>`,
    right: `<h4>8. Reframe setbacks</h4>
            <p>Shift the meaning you attach to the outcome. Instead of "I failed", try "This didn't work — what can I learn?" Reframing opens possibilities and reduces shame or hopelessness.</p>`
  },
  {
    left: `<h4>9. Practice self-kindness</h4>
           <p>Be as kind to yourself as you would be to a friend. Harsh self-criticism lengthens recovery. Gentle encouragement helps your brain calm and frees up energy for action.</p>`,
    right: `<h4>10. Notice progress</h4>
            <p>Keep a simple log of small wins — what you did differently, what you learned, who you reached out to. Seeing progress, even small, rebuilds confidence and makes new effort easier.</p>`
  },
  {
    left: `<h4>11. Reconnect to purpose</h4>
           <p>Remind yourself why the goal mattered. Does the original aim still fit your values and priorities? Sometimes adjustment or even a fresh goal is the best response — not stubbornly pursuing something that no longer fits.</p>`,
    right: `<h4>12. Try again (or pivot)</h4>
            <p>When you're ready, try again using the lessons learned. Or pivot to an alternative path that uses your strengths differently. Both resistance and flexibility are valid choices; choose with clarity.</p>`
  },
  {
    left: `<h4>Final encouragement</h4>
           <p>Disappointment doesn't define you. It's a signal that something didn't match expectations and an opportunity to grow. With simple steps — acknowledge, reflect, act — you can get unstuck, learn, and move toward a stronger, wiser version of your plans.</p>`,
    right: `<h4 style="margin-top:2px;">A closing note</h4>
            <p>Take a breath, choose one small next step, and keep going. Small consistent actions beat big perfect plans every time.</p>
            <p style="margin-top:12px;font-size:13px;color:#555;"><em>Summary inspired by "Get Unstuck from Disappointment" — Gill Hasson.</em></p>`
  }
];

/* State */
let spreadIndex = 0;

/* DOM */
const leftEl = document.getElementById('leftContent');
const rightEl = document.getElementById('rightContent');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const pageMeta = document.getElementById('pageMeta');
const bookEl = document.getElementById('book');

function render(){
  const total = spreads.length;
  const humanPage = spreadIndex + 1;
  pageMeta.textContent = `Page ${humanPage} / ${total}`;

  // Fill content
  leftEl.innerHTML = spreads[spreadIndex].left;
  rightEl.innerHTML = spreads[spreadIndex].right;

  // Buttons enabled state
  prevBtn.disabled = (spreadIndex === 0);
  nextBtn.disabled = (spreadIndex === total - 1);

  // Enable/disable page buttons
  const leftPrevBtn = document.getElementById('leftPrevBtn');
  const rightPrevBtn = document.getElementById('rightPrevBtn');
  const leftNextBtn = document.getElementById('leftNextBtn');
  const rightNextBtn = document.getElementById('rightNextBtn');
  if (leftPrevBtn) leftPrevBtn.disabled = (spreadIndex === 0);
  if (rightPrevBtn) rightPrevBtn.disabled = (spreadIndex === 0);
  if (leftNextBtn) leftNextBtn.disabled = (spreadIndex === total - 1);
  if (rightNextBtn) rightNextBtn.disabled = (spreadIndex === total - 1);
}

/* simple animation wrapper */
function animateTurn(direction){
  // direction: 'left' (prev) or 'right' (next)
  bookEl.classList.remove('turn-left','turn-right');
  // trigger reflow
  void bookEl.offsetWidth;
  bookEl.classList.add(direction === 'left' ? 'turn-left' : 'turn-right');

  // remove class after animation duration
  setTimeout(()=> {
    bookEl.classList.remove('turn-left','turn-right');
  }, 700);
}

/* Navigation */
function goNext(){
  if(spreadIndex < spreads.length - 1){
    animateTurn('right');
    spreadIndex++;
    setTimeout(render, 140); // short delay to let animation start
  }
}
function goPrev(){
  if(spreadIndex > 0){
    animateTurn('left');
    spreadIndex--;
    setTimeout(render, 140);
  }
}

/* Events */
nextBtn.addEventListener('click', goNext);
prevBtn.addEventListener('click', goPrev);

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') goNext();
  if (e.key === 'ArrowLeft') goPrev();
});

/* allow clicking near left/right sides of book to navigate */
bookEl.addEventListener('click', (ev) => {
  const rect = bookEl.getBoundingClientRect();
  const x = ev.clientX - rect.left;
  if (x < rect.width * 0.35) goPrev();
  else if (x > rect.width * 0.65) goNext();
});

/* initial render */
render();

/* Accessibility: focus outlines & announce changes */
leftEl.addEventListener('focus', ()=> leftEl.style.outline = 'none');
rightEl.addEventListener('focus', ()=> rightEl.style.outline = 'none');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Health App</title>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url("IMAGES/home.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 30px 20px;
            min-height: 100vh;
        }

        @keyframes floatUp {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 25px;
            max-width: 900px;
            width: 90%;
            padding: 30px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
        }

        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ffffff 0%, #f5f7fa 100%);
            border-radius: 20px;
            padding: 18px 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .app-icon::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s ease;
            pointer-events: none;
        }

        .app-icon:hover::before {
            left: 100%;
        }

        .app-icon:hover {
            transform: translateY(-10px) scale(1.08);
            box-shadow: 0 15px 40px rgba(255, 20, 147, 0.3);
            border-color: rgba(255, 20, 147, 0.3);
            background: linear-gradient(135deg, #ffffff 0%, #ffe8f0 100%);
        }

        .app-icon img {
            width: 50px;
            height: 50px;
            margin-bottom: 8px;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }

        .app-icon:hover img {
            transform: scale(1.15) rotate(5deg);
        }

        .app-icon span {
            color: #2d3748;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.5px;
            margin-top: 8px;
        }

        .title-container {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 240, 245, 0.95));
            padding: 30px 80px;
            border-radius: 50px;
            display: inline-block;
            box-shadow: 0 20px 60px rgba(102, 126, 234, 0.4);
            margin-bottom: 50px;
            border: 3px solid rgba(255, 20, 147, 0.3);
            position: relative;
            backdrop-filter: blur(10px);
            animation: floatUp 3s ease-in-out infinite;
        }

        @keyframes floatUp {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .title-container::before {
            content: '';
            position: absolute;
            inset: -12px;
            border-radius: 50px;
            border: 2px solid rgba(255, 20, 147, 0.2);
            pointer-events: none;
            animation: rotateBorder 20s linear infinite;
        }

        @keyframes rotateBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .title-container::after {
            content: '';
            position: absolute;
            top: -20px;
            right: 10%;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(255, 20, 147, 0.3), transparent);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle 6s ease-in-out infinite;
        }

        @keyframes floatParticle {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(20px, -20px) scale(1.1); }
        }

        .title-container h1 {
            color: #ff1493;
            font-size: 3em;
            font-family: 'Righteous', sans-serif;
            letter-spacing: 4px;
            text-shadow: 0 10px 30px rgba(255, 20, 147, 0.3);
            margin: 0;
            text-align: center;
            font-weight: 700;
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Click and Navigation Animation */
        @keyframes slideDown {
            0% {
                transform: translateY(-20px) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(100px) scale(0.9);
                opacity: 0;
            }
        }

        @keyframes slideUpIn {
            0% {
                transform: translateY(100px);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeOutSmooth {
            0% {
                opacity: 1;
            }
            100% {
                opacity: 0;
            }
        }

        @keyframes fadeInSmooth {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        body {
            animation: fadeInSmooth 0.8s ease-in-out;
        }

        .app-icon.active {
            animation: slideDown 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        body.fade-out {
            animation: fadeOutSmooth 0.8s ease-in-out forwards;
        }

        .signout-btn {
            position: fixed;
            top: 18px;
            right: 20px;
            z-index: 20;
            border: 0;
            border-radius: 999px;
            padding: 10px 16px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.7px;
            text-transform: uppercase;
            color: #fff;
            background: linear-gradient(135deg, #ff4f8b, #e11d48);
            box-shadow: 0 10px 22px rgba(225, 29, 72, 0.35);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .signout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(225, 29, 72, 0.42);
        }

        .signout-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <button class="signout-btn" onclick="signOut()">Sign Out</button>
    <div class="title-container">
        <h1>Welcome to Mood!</h1>
    </div>

        <!-- ...existing code... -->
<div class="container">
    <!-- App Icons -->
    <div class="app-icon" onclick="navigateTo('EMOTION%20CIRCLES.html', event)">
        <img src="IMAGES/verse.jpg" alt="Bible Verses">
        <span>Bible Verses</span>
    </div>
    <div class="app-icon" onclick="navigateTo('JOURNAL.html', event)">
        <img src="IMAGES/journal.jpg" alt="Journal">
        <span>Journal</span>
    </div>
    <div class="app-icon" onclick="navigateTo('Library.html', event)">
        <img src="IMAGES/library.jpg" alt="Library">
        <span>Library</span>
    </div>
        <div class="app-icon" onclick="navigateTo('motiv.html', event)">
        <img src="IMAGES/affir.jpg" alt="Motivation">
        <span>Motivation</span>
    </div>
    <div class="app-icon" onclick="navigateTo('mood%20boarding.html', event)">
        <img src="IMAGES/mood%20icon%20(1).jpg" alt="Mood Board">
        <span>Mood Board</span>
    </div>
    <div class="app-icon" onclick="navigateTo('walk%20with%20nature/Walk%20with%20nature.html', event)">
        <img src="IMAGES/run.jpg" alt="Walk with Nature">
        <span>Walk with Nature</span>
    </div>
    <div class="app-icon" onclick="navigateTo('question%20emoji.html', event)">
        <img src="IMAGES/ps.jpg" alt="Problem Solution">
        <span>Problem Solution</span>
    </div>
    <div class="app-icon" onclick="navigateTo('calindar.html', event)">
        <img src="IMAGES/calendar.jpg" alt="Mood Calendar">
        <span>Mood Calendar</span>
    </div>
    <div class="app-icon" onclick="navigateTo('11%20food.html', event)">
        <img src="IMAGES/food.jpg" alt="Food to help your mood">
        <span>Food to help your mood</span>
    </div>
</div>
<!-- ...existing code... -->
    <script>
        function navigateTo(url, evt) {
            const clickedIcon = evt ? evt.currentTarget : null;
            
            // Add slide down animation to clicked icon
            if (clickedIcon) {
                clickedIcon.classList.add('active');
            }
            
            // Fade out the page
            setTimeout(() => {
                document.body.classList.add('fade-out');
            }, 200);
            
            // Navigate after animation completes
            setTimeout(() => {
                window.location.href = url;
            }, 800);
        }

        async function signOut() {
            try {
                await fetch("/api/logout", {
                    method: "POST",
                    credentials: "include"
                });
            } catch (error) {
                // Ignore network issues and still force navigation to login.
            }
            window.location.href = "Log in/Log in.html";
        }
    </script>
</body>
</html>

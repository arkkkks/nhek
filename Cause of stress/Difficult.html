<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verses for Sadness</title>
    <!-- Elegant Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Great+Vibes&family=EB+Garamond:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-image:url("/IMAGES/Research%20UI%20(10).jpg");
            background-repeat:no-repeat;
            background-size: cover;
            font-family: Arial, sans-serif;
            background-color: #ffe6f2;
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Align to the left */
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0 20px 40px; /* Add left padding */
        }

        #header {
            text-align: left;
            margin-bottom: 20px;
            width: 100%;
        }

        #header h1 {
            font-family: 'Great Vibes', 'Playfair Display', 'EB Garamond', serif;
            font-size: 4em; /* Made heading bigger */
            color: #d63384;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-shadow: 2px 4px 18px #fff3fa, 0 1px 0 #a03c6e;
            margin-bottom: 10px;
            font-style: normal;
        }

        #header p {
            font-family: 'EB Garamond', 'Playfair Display', serif;
            font-size: 1.35em;
            color: #a03c6e;
            margin-top: 0;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .verse-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; /* 3 columns */
            gap: 18px 32px;
            justify-items: start;
            align-items: start;
            max-width: 700px;
            width: 100%;
        }

        .verse-button {
            background-color: #ffecb3;
            color: #795548;
            border: none;
            padding: 16px 28px;         /* Smaller padding */
            border-radius: 24px;        /* Slightly smaller radius */
            cursor: pointer;
            box-shadow: 0 4px 18px rgba(214, 51, 132, 0.18), 0 2px 8px rgba(0, 0, 0, 0.22);
            transition: transform 0.2s ease-in-out, box-shadow 0.2s;
            text-decoration: none;
            font-size: 1.15em;          /* Smaller font */
            text-align: left;
            min-width: 180px;           /* Narrower button */
            font-family: 'EB Garamond', 'Playfair Display', serif;
            font-weight: 700;
            white-space: pre-line; /* Allow line breaks */
            line-height: 1.5;
        }

        .verse-button:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 32px rgba(214, 51, 132, 0.28), 0 4px 16px rgba(0,0,0,0.28);
        }

        #jesus-image {
            margin-top: 30px;
        }

        #jesus-image img {
            width: 200px;
            height: auto;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>Difficult subject or poor understanding?</h1>
        <p>Here are the verses that will help you.</p>
    </div>

    <div class="verse-container">
        <a href="#" class="verse-button" onclick="alert('Psalm 34:17-18 verse will be displayed here')">. James 1:5</a>
        <a href="#" class="verse-button" onclick="alert('Luke 18:1 verse will be displayed here')">Proverbs 2:6</a>
        <a href="#" class="verse-button" onclick="alert('2 Kings 2:5 verse will be displayed here')">Philippians 4:6–7</a>
        <a href="#" class="verse-button" onclick="alert('Matthew 28:20 verse will be displayed here')">Psalm 119:105</a>
        <a href="#" class="verse-button" onclick="alert('Jeremiah 33:3 verse will be displayed here')">Isaiah 41:10</a>
        <a href="#" class="verse-button" onclick="alert('Romans 8:18 verse will be displayed here')">Proverbs 3:5–6</a>
        <a href="#" class="verse-button" onclick="alert('John 13:7 verse will be displayed here')">Psalm 37:5</a>
        <a href="#" class="verse-button" onclick="alert('Psalm 31:2 verse will be displayed here')">Colossians 3:23</a>
       <a href="#" class="verse-button" onclick="alert('Romans 8:18 verse will be displayed here')">Psalm 32:8</a>
        <a href="#" class="verse-button" onclick="alert('John 13:7 verse will be displayed here')">Matthew 11:28–29</a>
    </div>

    <script>
        // JavaScript can be added here for more advanced functionality
    </script>
</body>
</html>
